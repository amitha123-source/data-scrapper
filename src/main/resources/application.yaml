# Product data CSV file listener and two-file workflow
product-data:
  watch-directory: "C:\\Users\\amikr\\OneDrive\\Documents\\Product_data"
  kingpower-file-name: "Kingpower_data.csv"
  tomford-file-name: "Tomford_data.csv"
  # Delay (ms) between LLM calls when fetching missing product details; reduces rate-limit / HTTP errors (default 500)
  llm-fetch-delay-ms: 500
  # Delete existing brandsite rows per brand before save (true = idempotent re-runs; false = append duplicates)
  brandsite-replace-by-brand-on-run: true
