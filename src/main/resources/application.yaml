# Database: set DB_URL, DB_USERNAME, DB_PASSWORD (env or application-local.yaml). Defaults below for local MySQL.
spring:
  application:
    name: data-scrapper
  # Avoid RestartClassLoader ClassNotFoundException for ProductDataCsvService when using DevTools
  devtools:
    restart:
      enabled: false

  datasource:
    # Use standard names and include sensible pool defaults
    url: ${MYSQL_URL:jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:sys}?useSSL=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      # 'update' is fine for dev; change to 'validate' for prod
      ddl-auto: ${HIBERNATE_DDL:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

